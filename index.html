<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#fdf6ee">
<title>Perguntas em Família</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf6ee;
  --card: #fffaf5;
  --amber: #c97d3a;
  --amber-light: #e8a96a;
  --amber-pale: #f5dfc0;
  --green: #4a7a52;
  --green-light: #d3ead5;
  --blue: #3d6a99;
  --blue-light: #cde0f5;
  --rose: #9e4560;
  --rose-light: #f0d0da;
  --purple: #6e4e9a;
  --purple-light: #e0d0f5;
  --teal: #2e7a7a;
  --teal-light: #c8e8e8;
  --orange: #b85a20;
  --orange-light: #f5ddc8;
  --text: #3a2e22;
  --text-soft: #7a6a58;
  --border: #edddc8;
  --shadow: 0 10px 32px rgba(100,70,30,0.14);
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left, 0px);
  --safe-r: env(safe-area-inset-right, 0px);
  --nav-h: 78px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior-y: none; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  touch-action: manipulation;
  background-image:
    radial-gradient(ellipse at 8% 4%, #f5dfc060 0%, transparent 50%),
    radial-gradient(ellipse at 92% 96%, #d3ead550 0%, transparent 50%);
  overflow: hidden;
}

.app-scroll {
  width: 100%;
  max-width: 560px;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: calc(14px + var(--safe-t)) calc(14px + var(--safe-r)) calc(var(--nav-h) + var(--safe-b) + 14px) calc(14px + var(--safe-l));
}

header { text-align: center; margin-bottom: 16px; flex-shrink: 0; }
header .icon { font-size: clamp(1.9rem, 7vw, 2.2rem); display: block; margin-bottom: 2px; }
header h1 { font-family: 'Lora', serif; font-size: clamp(1.2rem, 5vw, 1.45rem); color: var(--amber); font-weight: 600; letter-spacing: -0.01em; }
header p { font-size: 0.76rem; color: var(--text-soft); margin-top: 2px; }

.mode-tabs {
  display: flex; gap: 6px; margin-bottom: 14px;
  background: #f0e4d2; border-radius: 999px; padding: 5px;
  width: 100%; max-width: 480px; flex-shrink: 0;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; -ms-overflow-style: none;
  scroll-snap-type: x proximity;
}
.mode-tabs::-webkit-scrollbar { display: none; }
.mode-tab {
  flex: 0 0 auto; border: none; border-radius: 999px; padding: 10px 14px;
  font-family: 'Nunito', sans-serif; font-size: 0.75rem; font-weight: 700;
  color: var(--text-soft); background: transparent; cursor: pointer;
  transition: background 0.2s, color 0.2s; letter-spacing: 0.01em; white-space: nowrap;
  scroll-snap-align: start; min-height: 40px;
}
.mode-tab.active { background: #fff; color: var(--amber); box-shadow: 0 2px 8px rgba(100,70,30,0.12); }
.mode-tab:active { transform: scale(0.96); }

.categories {
  display: flex; gap: 7px; flex-wrap: nowrap;
  margin-bottom: 18px; width: 100%; max-width: 560px; flex-shrink: 0;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; -ms-overflow-style: none;
  scroll-snap-type: x proximity; padding: 2px 2px 6px;
}
.categories::-webkit-scrollbar { display: none; }
.cat-btn {
  border: 2px solid transparent; border-radius: 999px; padding: 8px 15px;
  font-family: 'Nunito', sans-serif; font-size: 0.76rem; font-weight: 700;
  cursor: pointer; transition: transform 0.15s, filter 0.15s; letter-spacing: 0.02em; outline: none;
  flex: 0 0 auto; scroll-snap-align: start; white-space: nowrap; min-height: 38px;
}
.cat-btn:active { transform: scale(0.95); filter: brightness(0.95); }
.cat-btn.active { border-color: currentColor; }

.cat-btn.all        { background: var(--amber); color: #fff; }
.cat-btn.gerais     { background: var(--green-light); color: var(--green); }
.cat-btn.engracadas { background: var(--blue-light); color: var(--blue); }
.cat-btn.coracao    { background: var(--rose-light); color: var(--rose); }
.cat-btn.preferir   { background: var(--purple-light); color: var(--purple); }
.cat-btn.surpresa   { background: var(--amber-pale); color: var(--orange); }
.cat-btn.qall         { background: var(--teal); color: #fff; }
.cat-btn.q-engracadas { background: var(--blue-light); color: var(--blue); }
.cat-btn.q-aventura   { background: var(--green-light); color: var(--green); }
.cat-btn.q-imaginacao { background: var(--purple-light); color: var(--purple); }
.cat-btn.q-familia    { background: var(--rose-light); color: var(--rose); }
.cat-btn.q-divertidas { background: var(--orange-light); color: var(--orange); }
.cat-btn.q-escola     { background: var(--teal-light); color: var(--teal); }
.cat-btn.pall         { background: var(--purple); color: #fff; }
.cat-btn.p-aventura   { background: var(--green-light); color: var(--green); }
.cat-btn.p-poderes    { background: var(--blue-light); color: var(--blue); }
.cat-btn.p-engracadas { background: var(--orange-light); color: var(--orange); }
.cat-btn.p-comidas    { background: var(--rose-light); color: var(--rose); }
.cat-btn.p-familia    { background: var(--amber-pale); color: var(--amber); }
.cat-btn.p-imaginacao { background: var(--purple-light); color: var(--purple); }
.cat-btn.p-coracao    { background: var(--teal-light); color: var(--teal); }
.cat-btn.p-absurdas   { background: var(--green-light); color: var(--green); }
.cat-btn.p-escola     { background: var(--blue-light); color: var(--blue); }

/* ── NOVOS MODOS DE CARRO ── */
.cat-btn.edall  { background: #2f5f8a; color: #fff; }
.cat-btn.vqall  { background: #3f7a4a; color: #fff; }
.cat-btn.snall  { background: #a8447a; color: #fff; }
.cat-btn.cdall  { background: #1f6e6e; color: #fff; }
.cat-btn.rmall  { background: #c9862f; color: #fff; }
.cat-btn.ctall  { background: #6b4f9e; color: #fff; }
.cat-btn.gen1, .cat-label.gen1 { background: var(--green-light); color: var(--green); }
.cat-btn.gen2, .cat-label.gen2 { background: var(--blue-light); color: var(--blue); }
.cat-btn.gen3, .cat-label.gen3 { background: var(--rose-light); color: var(--rose); }
.cat-btn.gen4, .cat-label.gen4 { background: var(--purple-light); color: var(--purple); }

/* ── CURIOSIDADES (você sabia?) ── */
.mode-badge.curiosidades { background: #1f6e8c; }
.cat-btn.cxall        { background: #1f6e8c; color: #fff; }
.cat-btn.c-animais, .cat-label.c-animais       { background: var(--green-light); color: var(--green); }
.cat-btn.c-corpo, .cat-label.c-corpo           { background: var(--rose-light); color: var(--rose); }
.cat-btn.c-espaco, .cat-label.c-espaco         { background: var(--purple-light); color: var(--purple); }
.cat-btn.c-natureza, .cat-label.c-natureza     { background: var(--teal-light); color: var(--teal); }
.cat-btn.c-invencoes, .cat-label.c-invencoes   { background: var(--blue-light); color: var(--blue); }
.cat-btn.c-mundo, .cat-label.c-mundo           { background: var(--orange-light); color: var(--orange); }

.card-wrapper {
  width: 100%; max-width: 480px; margin-bottom: 14px;
  flex: 1; min-height: 220px; display: flex;
}
.card {
  background: var(--card); border-radius: 26px; box-shadow: var(--shadow);
  padding: clamp(28px, 8vw, 36px) clamp(20px, 6vw, 28px) 28px;
  width: 100%; min-height: 220px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; border: 1.5px solid var(--border);
  transition: opacity 0.22s, transform 0.22s;
  touch-action: pan-y;
}
.card.fade-out { opacity: 0; transform: scale(0.97); }

.cat-label {
  font-size: 0.67rem; font-weight: 700; letter-spacing: 0.09em;
  text-transform: uppercase; margin-bottom: 18px; padding: 4px 12px; border-radius: 999px;
}
.cat-label.gerais       { background: var(--green-light); color: var(--green); }
.cat-label.engracadas   { background: var(--blue-light); color: var(--blue); }
.cat-label.coracao      { background: var(--rose-light); color: var(--rose); }
.cat-label.preferir     { background: var(--purple-light); color: var(--purple); }
.cat-label.surpresa     { background: var(--amber-pale); color: var(--orange); }
.cat-label.q-engracadas { background: var(--blue-light); color: var(--blue); }
.cat-label.q-aventura   { background: var(--green-light); color: var(--green); }
.cat-label.q-imaginacao { background: var(--purple-light); color: var(--purple); }
.cat-label.q-familia    { background: var(--rose-light); color: var(--rose); }
.cat-label.q-divertidas { background: var(--orange-light); color: var(--orange); }
.cat-label.q-escola     { background: var(--teal-light); color: var(--teal); }
.cat-label.p-aventura   { background: var(--green-light); color: var(--green); }
.cat-label.p-poderes    { background: var(--blue-light); color: var(--blue); }
.cat-label.p-engracadas { background: var(--orange-light); color: var(--orange); }
.cat-label.p-comidas    { background: var(--rose-light); color: var(--rose); }
.cat-label.p-familia    { background: var(--amber-pale); color: var(--amber); }
.cat-label.p-imaginacao { background: var(--purple-light); color: var(--purple); }
.cat-label.p-coracao    { background: var(--teal-light); color: var(--teal); }
.cat-label.p-absurdas   { background: var(--green-light); color: var(--green); }
.cat-label.p-escola     { background: var(--blue-light); color: var(--blue); }

.mode-badge {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: #fff; padding: 3px 10px;
  border-radius: 999px; margin-bottom: 8px;
}
.mode-badge.perguntas { background: var(--amber); }
.mode-badge.quem      { background: var(--teal); }
.mode-badge.prefere   { background: var(--purple); }
.mode-badge.adedanha  { background: #2f5f8a; }
.mode-badge.vinte     { background: #3f7a4a; }
.mode-badge.simnao    { background: #a8447a; }
.mode-badge.cadeia    { background: #1f6e6e; }
.mode-badge.rima      { background: #c9862f; }
.mode-badge.continua  { background: #6b4f9e; }

.question { font-family: 'Lora', serif; font-size: clamp(1.05rem, 4.6vw, 1.22rem); line-height: 1.6; color: var(--text); font-style: italic; }
.card-tip {
  font-size: 0.72rem; color: var(--text-soft); margin-top: 14px;
  font-style: normal; font-family: 'Nunito', sans-serif;
  background: var(--amber-pale); padding: 5px 12px; border-radius: 999px;
}
.counter { font-size: 0.75rem; color: var(--text-soft); font-weight: 600; letter-spacing: 0.05em; margin-bottom: 10px; flex-shrink: 0; }
.swipe-hint { font-size: 0.68rem; color: var(--text-soft); opacity: 0.65; margin-top: 2px; }

.finished { text-align: center; padding: 24px 12px; }
.finished .emoji { font-size: 2.8rem; display: block; margin-bottom: 10px; }
.finished h2 { font-family: 'Lora', serif; font-size: 1.2rem; color: var(--amber); margin-bottom: 6px; }
.finished p { font-size: 0.84rem; color: var(--text-soft); margin-bottom: 18px; line-height: 1.5; }
.restart-btn {
  background: var(--amber); color: #fff; border: none; border-radius: 999px;
  padding: 13px 26px; font-family: 'Nunito', sans-serif; font-size: 0.9rem;
  font-weight: 700; cursor: pointer; transition: transform 0.15s, background 0.2s;
  min-height: 48px;
}
.restart-btn:active { background: var(--amber-light); transform: scale(0.97); }

.nav {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
  display: flex; align-items: center; gap: 10px; justify-content: center;
  padding: 10px calc(16px + var(--safe-r)) calc(12px + var(--safe-b)) calc(16px + var(--safe-l));
  background: linear-gradient(to top, var(--bg) 55%, rgba(253,246,238,0));
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
.nav-inner {
  display: flex; align-items: center; gap: 10px; width: 100%; max-width: 480px;
}
.nav-btn {
  background: var(--card); border: 1.5px solid var(--border); border-radius: 999px;
  padding: 13px 20px; font-family: 'Nunito', sans-serif; font-size: 0.88rem;
  font-weight: 700; color: var(--text); cursor: pointer; transition: transform 0.15s, background 0.2s;
  box-shadow: 0 2px 10px rgba(100,70,30,0.09);
  flex: 1; min-height: 50px;
}
.nav-btn:active:not(:disabled) { transform: scale(0.96); background: var(--amber-pale); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn.next { background: var(--amber); color: #fff; border-color: var(--amber); flex: 1.3; }
.nav-btn.next:active:not(:disabled) { background: var(--amber-light); border-color: var(--amber-light); }

/* ── TOPBAR (hamburger + current filter) ── */
.topbar {
  display: flex; align-items: center; gap: 10px;
  width: 100%; max-width: 480px; margin-bottom: 16px; flex-shrink: 0;
}
.hamburger-btn {
  width: 46px; height: 46px; border-radius: 15px; flex-shrink: 0;
  border: 1.5px solid var(--border); background: var(--card); color: var(--amber);
  font-size: 1.25rem; display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 2px 10px rgba(100,70,30,0.1);
  transition: transform 0.15s, background 0.2s;
}
.hamburger-btn:active { transform: scale(0.94); background: var(--amber-pale); }
.topbar-info {
  flex: 1; min-width: 0; text-align: left; cursor: pointer;
  background: var(--card); border: 1.5px solid var(--border); border-radius: 15px;
  padding: 7px 16px; display: flex; flex-direction: column; gap: 1px;
  box-shadow: 0 2px 10px rgba(100,70,30,0.08); transition: transform 0.15s, background 0.2s;
}
.topbar-info:active { transform: scale(0.98); background: var(--amber-pale); }
.topbar-mode { font-size: 0.82rem; font-weight: 700; color: var(--amber); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-cat { font-size: 0.72rem; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── SIDEBAR DRAWER ── */
.sidebar-overlay {
  position: fixed; inset: 0; background: rgba(58,46,34,0.38);
  backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
  z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.sidebar-overlay.open { opacity: 1; pointer-events: auto; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
  width: min(84vw, 320px); background: var(--bg);
  box-shadow: 8px 0 34px rgba(100,70,30,0.28);
  transform: translateX(-100%); transition: transform 0.28s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
  padding-top: var(--safe-t); padding-bottom: var(--safe-b); padding-left: var(--safe-l);
}
.sidebar.open { transform: translateX(0); }
.sidebar-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 16px 14px; flex-shrink: 0; border-bottom: 1.5px solid var(--border);
}
.sidebar-title { font-family: 'Lora', serif; font-weight: 600; color: var(--amber); font-size: 1.08rem; }
.sidebar-close {
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: var(--amber-pale); color: var(--amber); font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: transform 0.15s;
}
.sidebar-close:active { transform: scale(0.9); }
.sidebar-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 10px 24px; }

.mode-section { margin-bottom: 4px; }
.mode-section-head {
  width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 13px 12px; border: none; background: transparent; cursor: pointer;
  font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 700;
  color: var(--text); border-radius: 14px; transition: background 0.2s; text-align: left;
}
.mode-section-head.current { background: var(--amber-pale); color: var(--orange); }
.mode-section-head:active { transform: scale(0.99); }
.mode-section-arrow { transition: transform 0.2s; font-size: 0.65rem; color: var(--text-soft); flex-shrink: 0; }
.mode-section-arrow.expanded { transform: rotate(90deg); }
.mode-section-cats { display: flex; flex-direction: column; gap: 5px; padding: 4px 6px 12px 20px; }
.sub-cat-btn {
  display: block; width: 100%; text-align: left;
  border: 2px solid transparent; border-radius: 12px; padding: 10px 14px;
  font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; transition: transform 0.15s, filter 0.15s; white-space: normal;
}
.sub-cat-btn:active { transform: scale(0.97); filter: brightness(0.95); }
.sub-cat-btn.active { border-color: currentColor; }

/* ── ADIVINHA ANSWER ── */
.mode-badge.adivinha { background: #e07b20; }
.cat-btn.aall { background: #e07b20; color: #fff; }
.cat-label.adivinha { background: #fde8cc; color: #e07b20; }

.answer-block {
  margin-top: 18px;
  width: 100%;
}
.answer-blur {
  font-family: 'Lora', serif;
  font-size: 1rem;
  line-height: 1.6;
  color: var(--text);
  font-style: italic;
  background: var(--amber-pale);
  border-radius: 12px;
  padding: 10px 16px;
  filter: blur(6px);
  cursor: pointer;
  transition: filter 0.3s;
  user-select: none;
}
.answer-blur.revealed { filter: blur(0); cursor: default; }
.answer-hint {
  font-size: 0.7rem;
  color: var(--text-soft);
  font-family: 'Nunito', sans-serif;
  margin-top: 6px;
  display: block;
  letter-spacing: 0.04em;
}
.answer-hint.hidden { display: none; }

/* ── HISTÓRIA MALUCA ── */
.mode-badge.historia { background: var(--rose); }
.cat-btn.hall { background: var(--rose); color: #fff; }
.cat-btn.h-aventura   { background: var(--green-light); color: var(--green); }
.cat-btn.h-escola     { background: var(--teal-light); color: var(--teal); }
.cat-btn.h-herois     { background: var(--blue-light); color: var(--blue); }
.cat-btn.h-familia    { background: var(--rose-light); color: var(--rose); }
.cat-btn.h-espaco     { background: var(--purple-light); color: var(--purple); }
.cat-btn.h-festa      { background: var(--orange-light); color: var(--orange); }
.cat-btn.h-animais    { background: var(--amber-pale); color: var(--amber); }
.cat-btn.h-comida     { background: var(--rose-light); color: var(--rose); }
.cat-label.historia   { background: var(--rose-light); color: var(--rose); }
.cat-label.h-aventura { background: var(--green-light); color: var(--green); }
.cat-label.h-escola   { background: var(--teal-light); color: var(--teal); }
.cat-label.h-herois   { background: var(--blue-light); color: var(--blue); }
.cat-label.h-familia  { background: var(--rose-light); color: var(--rose); }
.cat-label.h-espaco   { background: var(--purple-light); color: var(--purple); }
.cat-label.h-festa    { background: var(--orange-light); color: var(--orange); }
.cat-label.h-animais  { background: var(--amber-pale); color: var(--amber); }
.cat-label.h-comida   { background: var(--rose-light); color: var(--rose); }

.submode-toggle {
  display: flex; gap: 6px; background: var(--rose-light); border-radius: 999px;
  padding: 4px; margin-bottom: 18px; width: 100%; max-width: 320px;
}
.submode-btn {
  flex: 1; border: none; border-radius: 999px; padding: 10px 6px; min-height: 40px;
  font-family: 'Nunito', sans-serif; font-size: 0.72rem; font-weight: 700;
  color: var(--rose); background: transparent; cursor: pointer; transition: background 0.2s, color 0.2s;
}
.submode-btn.active { background: var(--rose); color: #fff; }
.submode-btn:active { transform: scale(0.97); }

.historia-intro { text-align: center; }
.historia-intro .emoji { font-size: 2.4rem; display: block; margin-bottom: 6px; }
.historia-intro h2 { font-family: 'Lora', serif; font-size: 1.15rem; color: var(--rose); margin-bottom: 8px; }
.historia-intro p { font-size: 0.82rem; color: var(--text-soft); margin-bottom: 6px; line-height: 1.5; }
.roll-btn {
  background: var(--rose); color: #fff; border: none; border-radius: 999px;

};
let sidebarExpandedMode = currentMode;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck(mode, cat) {
  const qs = DATA[mode].questions;
  return shuffle(cat === "all" ? qs : qs.filter(q => q.cat === cat));
}

function openSidebar() {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebarOverlay").classList.add("open");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("open");
}

function toggleModeSection(mode) {
  sidebarExpandedMode = (sidebarExpandedMode === mode) ? null : mode;
  renderSidebar();
}

function sidebarChooseCat(mode, catId) {
  if (mode !== currentMode) setMode(mode);
  selectCat(catId);
  closeSidebar();
}

function updateTopbar() {
  const meta = MODE_META[currentMode];
  const topbarMode = document.getElementById("topbarMode");
  const topbarCat  = document.getElementById("topbarCat");
  if (!topbarMode || !topbarCat) return;
  topbarMode.textContent = `${meta.icon} ${meta.label}`;
  const found = DATA[currentMode].cats.find(c => c.id === currentCat);
  topbarCat.textContent = found ? found.label : "";
}

function renderSidebar() {
  const container = document.getElementById("sidebarContent");
  if (!container) return;
  container.innerHTML = "";
  Object.keys(MODE_META).forEach(mode => {
    const meta = MODE_META[mode];
    const isCurrent  = mode === currentMode;
    const isExpanded = sidebarExpandedMode === mode;

    const section = document.createElement("div");
    section.className = "mode-section";

    const head = document.createElement("button");
    head.className = `mode-section-head${isCurrent ? " current" : ""}`;
    head.innerHTML = `<span>${meta.icon} ${meta.label}</span><span class="mode-section-arrow${isExpanded ? " expanded" : ""}">▶</span>`;
    head.onclick = () => {
      if (mode !== currentMode) {
        setMode(mode);
        sidebarExpandedMode = mode;
        renderSidebar();
      } else {
        toggleModeSection(mode);
      }
    };
    section.appendChild(head);

    if (isExpanded) {
      const catsWrap = document.createElement("div");
      catsWrap.className = "mode-section-cats";
      DATA[mode].cats.forEach(c => {
        const btn = document.createElement("button");
        btn.className = `cat-btn sub-cat-btn ${c.cls}`;
        if (isCurrent && c.id === currentCat) btn.classList.add("active");
        btn.textContent = c.label;
        btn.onclick = () => sidebarChooseCat(mode, c.id);
        catsWrap.appendChild(btn);
      });
      section.appendChild(catsWrap);
    }
    container.appendChild(section);
  });
  updateTopbar();
}

function render() {
  const card    = document.getElementById("card");
  const counter = document.getElementById("counter");
  const nav     = document.getElementById("nav");
  const btnPrev = document.getElementById("btnPrev");

  if (currentMode === "historia") {
    renderHistoria();
    return;

  if (currentMode === "adedanha" && !finished) {
    nav.style.display = "flex";
    if (idx !== lastLetterIdx) { newAdedanhaLetter(); lastLetterIdx = idx; }

    card.innerHTML = `
      <span class="mode-badge adedanha">🔤 Adedanha Verbal</span>

  const modeBadgeMap = {
    perguntas: "💬 Perguntas",

  const rimaTip = currentMode === "rima"

  const adivinhaPrefix = currentMode === "adivinha"

// ─────────────────────────────────────────
function go(dir) {
  const card = document.getElementById("card");
  card.classList.add("fade-out");
  setTimeout(() => {
    card.classList.remove("fade-out");
    if (dir === 1) {
      if (idx < deck.length - 1) idx++;
      else finished = true;
    } else {
      if (finished) finished = false;
      else if (idx > 0) idx--;
    }
    render();
  }, 210);
}

function selectCat(cat) {
  currentCat = cat;
  renderSidebar();
  if (currentMode === "historia") {
    historiaCat = cat;
    historiaRestart();
    return;
  }
  deck = buildDeck(currentMode, cat);
  idx = 0; finished = false;
  lastLetterIdx = -1;
  render();
}

function setMode(mode) {
  currentMode = mode;
  currentCat = "all";
  sidebarExpandedMode = mode;
  if (mode === "historia") {
    historiaCat = "all";
    historiaStage = "select";
    historiaStory = null;
    historiaAnswers = {};
    historiaBlankIdx = 0;
    renderSidebar();
    render();
    return;
  }
  deck = buildDeck(mode, "all");
  idx = 0; finished = false;
  lastLetterIdx = -1;
  renderSidebar();
  render();
}

function restart() {
  deck = buildDeck(currentMode, currentCat);
  idx = 0; finished = false;
  lastLetterIdx = -1;
  document.getElementById("nav").style.display = "flex";
  render();
}

function revealAnswer() {
  const blur = document.getElementById("answerBlur");
  const hint = document.getElementById("answerHint");
  if (blur) blur.classList.add("revealed");
  if (hint) hint.classList.add("hidden");
}

// Estado específico do modo História Maluca
let historiaSubMode = "classico"; // "classico" | "formulario"
let historiaCat = "all";
let historiaStory = null;
let historiaBlankIdx = 0;
let historiaAnswers = {};
let historiaStage = "select"; // "select" | "collect" | "reveal"
let historiaListening = false;

function pickStory(cat) {
  const list = cat === "all" ? DATA.historia.stories : DATA.historia.stories.filter(s => s.cat === cat);
  return list[Math.floor(Math.random() * list.length)];
}

function speechSupported() {
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}

function listenFor(onResult, statusEl) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { onResult(null); return; }
  const rec = new SR();
  rec.lang = "pt-BR";
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  historiaListening = true;
  if (statusEl) statusEl();
  rec.onresult = (e) => {
    historiaListening = false;
    const text = e.results[0][0].transcript;
    onResult(text.charAt(0).toUpperCase() + text.slice(1));
  };
  rec.onerror = () => { historiaListening = false; onResult(null); if (statusEl) statusEl(); };
  rec.onend = () => { historiaListening = false; if (statusEl) statusEl(); };
  try { rec.start(); } catch(e) { historiaListening = false; onResult(null); }
}

function startHistoriaFlow() {
  historiaStory = pickStory(historiaCat);
  historiaAnswers = {};
  historiaBlankIdx = 0;
  historiaStage = "collect";
  render();
}

function setHistoriaSubMode(mode) {
  historiaSubMode = mode;
  render();
}

function fillStoryText(story, answers) {
  let text = story.template;
  story.blanks.forEach(b => {
    const val = answers[b.id];
    const re = new RegExp(`\\{${b.id}\\}`, "g");
    text = text.replace(re, val ? `<span class="filled">${val}</span>` : `<span class="filled">___</span>`);
  });
  return text;
}

function micClassicRecord() {
  const blank = historiaStory.blanks[historiaBlankIdx];
  listenFor((text) => {
    if (text) historiaAnswers[blank.id] = text;
    render();
  }, () => render());
  render();
}

function classicTypeAnswer(val) {
  const blank = historiaStory.blanks[historiaBlankIdx];
  historiaAnswers[blank.id] = val;
}

function classicNext() {
  if (historiaBlankIdx < historiaStory.blanks.length - 1) {
    historiaBlankIdx++;
  } else {
    historiaStage = "reveal";
  }
  render();
}

function classicPrev() {
  if (historiaBlankIdx > 0) historiaBlankIdx--;
  render();
}

function formMicRecord(blankId) {
  listenFor((text) => {
    if (text) historiaAnswers[blankId] = text;
    render();
  }, () => render());
  render();
}

function formTypeAnswer(blankId, val) {
  historiaAnswers[blankId] = val;
}

function historiaRestart() {
  historiaStage = "select";
  historiaStory = null;
  historiaAnswers = {};
  historiaBlankIdx = 0;
  render();
}

function historiaNewStorySameCat() {
  startHistoriaFlow();
}

function renderHistoria() {
  const card = document.getElementById("card");
  const counter = document.getElementById("counter");
  const nav = document.getElementById("nav");
  nav.style.display = "none";
  counter.textContent = "";

  if (historiaStage === "select") {
    card.innerHTML = `
      <span class="mode-badge historia">📖 História Maluca</span>
      <div class="submode-toggle">
        <button class="submode-btn ${historiaSubMode==='classico'?'active':''}" onclick="setHistoriaSubMode('classico')">🎙️ Clássico (às cegas)</button>
        <button class="submode-btn ${historiaSubMode==='formulario'?'active':''}" onclick="setHistoriaSubMode('formulario')">📋 Formulário</button>
      </div>
      <div class="historia-intro">
        <span class="emoji">🤪</span>
        <h2>Vamos criar uma história maluca!</h2>
        <p>${historiaSubMode === 'classico'
          ? 'Cada pessoa fala uma palavra sem saber onde ela vai entrar na história — a graça é a surpresa no final!'
          : 'Todas as palavras aparecem juntas. É só falar cada uma no microfone e revelar a história completa.'}</p>
        <p>Escolha um tema (ou deixe em "Todas") e toque para sortear uma história.</p>
        <button class="roll-btn" onclick="startHistoriaFlow()">🎲 Sortear história</button>
      </div>
    `;
    return;
  }

  if (historiaStage === "collect" && historiaSubMode === "classico") {
    const blank = historiaStory.blanks[historiaBlankIdx];
    const answered = historiaAnswers[blank.id];
    const supported = speechSupported();
    card.innerHTML = `
      <span class="mode-badge historia">📖 ${historiaStory.title}</span>
      <p class="blank-progress">Palavra ${historiaBlankIdx + 1} de ${historiaStory.blanks.length}</p>
      <p class="blank-label">${blank.label}</p>
      <p class="blank-hint">${blank.hint}</p>
      ${supported ? `
        <button class="mic-btn ${historiaListening ? 'listening' : ''}" onclick="micClassicRecord()">🎙️</button>
        <p class="mic-status">${historiaListening ? 'Ouvindo... fale agora!' : (answered ? '' : 'Toque e fale a palavra')}</p>
      ` : `
        <p class="mic-status">Seu navegador não suporta microfone — digite abaixo:</p>
      `}
      <input type="text" class="text-fallback" placeholder="ou digite aqui" value="${answered || ''}"
        oninput="classicTypeAnswer(this.value)" onkeydown="if(event.key==='Enter') classicNext()">
      ${answered ? `<p class="blank-answer">✅ ${answered}</p>` : ''}
      <div class="blank-actions">
        <button class="nav-btn prev" onclick="classicPrev()" ${historiaBlankIdx===0?'disabled':''}>← Anterior</button>
        <button class="nav-btn next" onclick="classicNext()">${historiaBlankIdx === historiaStory.blanks.length - 1 ? 'Revelar história →' : 'Próxima →'}</button>
      </div>
    `;
    return;
  }

  if (historiaStage === "collect" && historiaSubMode === "formulario") {
    const supported = speechSupported();
    const allFilled = historiaStory.blanks.every(b => historiaAnswers[b.id]);
    const items = historiaStory.blanks.map(b => {
      const answered = historiaAnswers[b.id];
      return `
        <div class="form-item">
          <div>
            <div class="form-item-label">${b.label}</div>
            <div class="form-item-hint">${b.hint}</div>
            ${answered ? `<div class="form-item-answer">✅ ${answered}</div>` : ''}
          </div>
          ${supported
            ? `<button class="mic-btn-small ${historiaListening ? 'listening' : ''}" onclick="formMicRecord('${b.id}')">🎙️</button>`
            : `<input type="text" class="text-fallback" style="max-width:120px;margin-top:0;" placeholder="digite" value="${answered || ''}" oninput="formTypeAnswer('${b.id}', this.value); render()">`
          }
        </div>
      `;
    }).join("");
    card.innerHTML = `
      <span class="mode-badge historia">📖 ${historiaStory.title}</span>
      <div class="form-list">${items}</div>
      <div class="blank-actions">
        <button class="nav-btn" onclick="historiaRestart()">← Trocar história</button>
        <button class="nav-btn next" onclick="historiaStage='reveal'; render();">Revelar história →</button>
      </div>
      ${!allFilled ? '<p class="mic-status" style="margin-top:10px;">Dica: campos em branco viram "___" na história</p>' : ''}
    `;
    return;
  }

  if (historiaStage === "reveal") {
    card.innerHTML = `
      <span class="mode-badge historia">📖 ${historiaStory.title}</span>
      <p class="story-text">${fillStoryText(historiaStory, historiaAnswers)}</p>
      <div class="blank-actions">
        <button class="nav-btn" onclick="historiaRestart()">🔀 Trocar tema</button>
        <button class="nav-btn next" onclick="historiaNewStorySameCat()">🎲 Nova história</button>
      </div>
    `;
  }
}

// ─── SWIPE GESTURE (mobile) ───
(function initSwipe() {
  const card = document.getElementById("card");
  let startX = 0, startY = 0, tracking = false;
  card.addEventListener("touchstart", (e) => {
    if (currentMode === "historia") return;
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY; tracking = true;
  }, { passive: true });
  card.addEventListener("touchend", (e) => {
    if (!tracking || currentMode === "historia") { tracking = false; return; }
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.4) {
      if (dx < 0) go(1); else go(-1);
    }
  }, { passive: true });
})();

// ─── INIT ───
setMode("perguntas");
</script>
