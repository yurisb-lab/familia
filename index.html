<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perguntas em Família</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf6ee;
  --card: #fffaf5;
  --amber: #c97d3a;
  --amber-light: #e8a96a;
  --amber-pale: #f5dfc0;
  --green: #4a7a52;
  --green-light: #d3ead5;
  --blue: #3d6a99;
  --blue-light: #cde0f5;
  --rose: #9e4560;
  --rose-light: #f0d0da;
  --purple: #6e4e9a;
  --purple-light: #e0d0f5;
  --teal: #2e7a7a;
  --teal-light: #c8e8e8;
  --orange: #b85a20;
  --orange-light: #f5ddc8;
  --text: #3a2e22;
  --text-soft: #7a6a58;
  --border: #edddc8;
  --shadow: 0 4px 28px rgba(100,70,30,0.11);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 14px 48px;
  background-image:
    radial-gradient(ellipse at 8% 8%, #f5dfc050 0%, transparent 48%),
    radial-gradient(ellipse at 92% 88%, #d3ead548 0%, transparent 48%);
}
header { text-align: center; margin-bottom: 22px; }
header .icon { font-size: 2.2rem; display: block; margin-bottom: 4px; }
header h1 { font-family: 'Lora', serif; font-size: 1.45rem; color: var(--amber); font-weight: 600; }
header p { font-size: 0.78rem; color: var(--text-soft); margin-top: 3px; }

.mode-tabs {
  display: flex; gap: 6px; margin-bottom: 18px;
  background: #f0e4d2; border-radius: 999px; padding: 5px;
  max-width: 480px; width: 100%;
}
.mode-tab {
  flex: 1; border: none; border-radius: 999px; padding: 9px 8px;
  font-family: 'Nunito', sans-serif; font-size: 0.73rem; font-weight: 700;
  color: var(--text-soft); background: transparent; cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.01em; white-space: nowrap;
}
.mode-tab.active { background: #fff; color: var(--amber); box-shadow: 0 2px 8px rgba(100,70,30,0.12); }

.categories {
  display: flex; flex-wrap: wrap; gap: 7px; justify-content: center;
  margin-bottom: 20px; max-width: 560px; width: 100%;
}
.cat-btn {
  border: 2px solid transparent; border-radius: 999px; padding: 6px 14px;
  font-family: 'Nunito', sans-serif; font-size: 0.75rem; font-weight: 700;
  cursor: pointer; transition: all 0.18s; letter-spacing: 0.02em; outline: none;
}
.cat-btn:hover { transform: translateY(-1px); filter: brightness(0.95); }
.cat-btn.active { border-color: currentColor; transform: translateY(-1px); }

.cat-btn.all        { background: var(--amber); color: #fff; }
.cat-btn.gerais     { background: var(--green-light); color: var(--green); }
.cat-btn.engracadas { background: var(--blue-light); color: var(--blue); }
.cat-btn.coracao    { background: var(--rose-light); color: var(--rose); }
.cat-btn.preferir   { background: var(--purple-light); color: var(--purple); }
.cat-btn.surpresa   { background: var(--amber-pale); color: var(--orange); }
.cat-btn.qall         { background: var(--teal); color: #fff; }
.cat-btn.q-engracadas { background: var(--blue-light); color: var(--blue); }
.cat-btn.q-aventura   { background: var(--green-light); color: var(--green); }
.cat-btn.q-imaginacao { background: var(--purple-light); color: var(--purple); }
.cat-btn.q-familia    { background: var(--rose-light); color: var(--rose); }
.cat-btn.q-divertidas { background: var(--orange-light); color: var(--orange); }
.cat-btn.q-escola     { background: var(--teal-light); color: var(--teal); }
.cat-btn.pall         { background: var(--purple); color: #fff; }
.cat-btn.p-aventura   { background: var(--green-light); color: var(--green); }
.cat-btn.p-poderes    { background: var(--blue-light); color: var(--blue); }
.cat-btn.p-engracadas { background: var(--orange-light); color: var(--orange); }
.cat-btn.p-comidas    { background: var(--rose-light); color: var(--rose); }
.cat-btn.p-familia    { background: var(--amber-pale); color: var(--amber); }
.cat-btn.p-imaginacao { background: var(--purple-light); color: var(--purple); }
.cat-btn.p-coracao    { background: var(--teal-light); color: var(--teal); }
.cat-btn.p-absurdas   { background: var(--green-light); color: var(--green); }
.cat-btn.p-escola     { background: var(--blue-light); color: var(--blue); }

.card-wrapper { width: 100%; max-width: 480px; margin-bottom: 14px; }
.card {
  background: var(--card); border-radius: 24px; box-shadow: var(--shadow);
  padding: 36px 28px 32px; min-height: 210px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; border: 1.5px solid var(--border);
  transition: opacity 0.22s, transform 0.22s;
}
.card.fade-out { opacity: 0; transform: scale(0.97); }

.cat-label {
  font-size: 0.67rem; font-weight: 700; letter-spacing: 0.09em;
  text-transform: uppercase; margin-bottom: 18px; padding: 4px 12px; border-radius: 999px;
}
.cat-label.gerais       { background: var(--green-light); color: var(--green); }
.cat-label.engracadas   { background: var(--blue-light); color: var(--blue); }
.cat-label.coracao      { background: var(--rose-light); color: var(--rose); }
.cat-label.preferir     { background: var(--purple-light); color: var(--purple); }
.cat-label.surpresa     { background: var(--amber-pale); color: var(--orange); }
.cat-label.q-engracadas { background: var(--blue-light); color: var(--blue); }
.cat-label.q-aventura   { background: var(--green-light); color: var(--green); }
.cat-label.q-imaginacao { background: var(--purple-light); color: var(--purple); }
.cat-label.q-familia    { background: var(--rose-light); color: var(--rose); }
.cat-label.q-divertidas { background: var(--orange-light); color: var(--orange); }
.cat-label.q-escola     { background: var(--teal-light); color: var(--teal); }
.cat-label.p-aventura   { background: var(--green-light); color: var(--green); }
.cat-label.p-poderes    { background: var(--blue-light); color: var(--blue); }
.cat-label.p-engracadas { background: var(--orange-light); color: var(--orange); }
.cat-label.p-comidas    { background: var(--rose-light); color: var(--rose); }
.cat-label.p-familia    { background: var(--amber-pale); color: var(--amber); }
.cat-label.p-imaginacao { background: var(--purple-light); color: var(--purple); }
.cat-label.p-coracao    { background: var(--teal-light); color: var(--teal); }
.cat-label.p-absurdas   { background: var(--green-light); color: var(--green); }
.cat-label.p-escola     { background: var(--blue-light); color: var(--blue); }

.mode-badge {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: #fff; padding: 3px 10px;
  border-radius: 999px; margin-bottom: 8px;
}
.mode-badge.perguntas { background: var(--amber); }
.mode-badge.quem      { background: var(--teal); }
.mode-badge.prefere   { background: var(--purple); }

.question { font-family: 'Lora', serif; font-size: 1.18rem; line-height: 1.65; color: var(--text); font-style: italic; }
.card-tip {
  font-size: 0.72rem; color: var(--text-soft); margin-top: 14px;
  font-style: normal; font-family: 'Nunito', sans-serif;
  background: var(--amber-pale); padding: 5px 12px; border-radius: 999px;
}
.counter { font-size: 0.75rem; color: var(--text-soft); font-weight: 600; letter-spacing: 0.05em; margin-bottom: 16px; }

.finished { text-align: center; padding: 24px 12px; }
.finished .emoji { font-size: 2.8rem; display: block; margin-bottom: 10px; }
.finished h2 { font-family: 'Lora', serif; font-size: 1.2rem; color: var(--amber); margin-bottom: 6px; }
.finished p { font-size: 0.84rem; color: var(--text-soft); margin-bottom: 18px; line-height: 1.5; }
.restart-btn {
  background: var(--amber); color: #fff; border: none; border-radius: 999px;
  padding: 11px 26px; font-family: 'Nunito', sans-serif; font-size: 0.88rem;
  font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.restart-btn:hover { background: var(--amber-light); transform: translateY(-1px); }

.nav { display: flex; align-items: center; gap: 12px; max-width: 480px; width: 100%; justify-content: center; }
.nav-btn {
  background: var(--card); border: 1.5px solid var(--border); border-radius: 999px;
  padding: 11px 24px; font-family: 'Nunito', sans-serif; font-size: 0.85rem;
  font-weight: 700; color: var(--text); cursor: pointer; transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(100,70,30,0.07);
}
.nav-btn:hover:not(:disabled) { background: var(--amber-pale); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(100,70,30,0.12); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn.next { background: var(--amber); color: #fff; border-color: var(--amber); }
.nav-btn.next:hover:not(:disabled) { background: var(--amber-light); border-color: var(--amber-light); }

/* ── ADIVINHA ANSWER ── */
.mode-badge.adivinha { background: #e07b20; }
.cat-btn.aall { background: #e07b20; color: #fff; }
.cat-label.adivinha { background: #fde8cc; color: #e07b20; }

.answer-block {
  margin-top: 18px;
  width: 100%;
}
.answer-blur {
  font-family: 'Lora', serif;
  font-size: 1rem;
  line-height: 1.6;
  color: var(--text);
  font-style: italic;
  background: var(--amber-pale);
  border-radius: 12px;
  padding: 10px 16px;
  filter: blur(6px);
  cursor: pointer;
  transition: filter 0.3s;
  user-select: none;
}
.answer-blur.revealed { filter: blur(0); cursor: default; }
.answer-hint {
  font-size: 0.7rem;
  color: var(--text-soft);
  font-family: 'Nunito', sans-serif;
  margin-top: 6px;
  display: block;
  letter-spacing: 0.04em;
}
.answer-hint.hidden { display: none; }

/* ── IA ── */
.ai-gear {
  position: fixed; top: 14px; right: 14px; width: 38px; height: 38px;
  border-radius: 50%; background: var(--card); border: 1.5px solid var(--border);
  box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; cursor: pointer; z-index: 50; transition: transform 0.2s;
}
.ai-gear:hover { transform: rotate(25deg); }

.ai-panel {
  width: 100%; max-width: 480px; margin-top: 14px;
  background: var(--card); border: 1.5px solid var(--border); border-radius: 18px;
  padding: 14px 16px; box-shadow: var(--shadow);
}
.ai-panel-title {
  font-size: 0.72rem; font-weight: 700; color: var(--teal); letter-spacing: 0.06em;
  text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.ai-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.ai-btn {
  flex: 1; min-width: 140px; border: none; border-radius: 999px; padding: 10px 14px;
  font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s; background: var(--teal); color: #fff;
}
.ai-btn:hover:not(:disabled) { background: #256363; transform: translateY(-1px); }
.ai-btn:disabled { opacity: 0.5; cursor: default; }
.ai-btn.secondary { background: var(--purple); }
.ai-btn.secondary:hover:not(:disabled) { background: #59407e; }
.ai-answer-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 8px 12px;
  font-family: 'Nunito', sans-serif; font-size: 0.82rem; color: var(--text);
  resize: vertical; min-height: 44px; margin-bottom: 8px; background: #fff;
}
.ai-answer-input:focus { outline: none; border-color: var(--teal); }
.ai-status { font-size: 0.72rem; color: var(--text-soft); min-height: 16px; }
.ai-status.error { color: #b03030; }
.ai-question-box {
  font-family: 'Lora', serif; font-style: italic; font-size: 1rem; line-height: 1.55;
  background: var(--teal-light); color: var(--text); border-radius: 12px;
  padding: 12px 14px; margin-top: 8px;
}
.ai-spinner {
  display: inline-block; width: 14px; height: 14px; border: 2px solid var(--teal-light);
  border-top-color: var(--teal); border-radius: 50%; animation: ai-spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes ai-spin { to { transform: rotate(360deg); } }

.ai-modal-overlay {
  position: fixed; inset: 0; background: rgba(58,46,34,0.45); z-index: 100;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.ai-modal {
  background: var(--card); border-radius: 20px; padding: 24px 22px; max-width: 380px; width: 100%;
  box-shadow: var(--shadow);
}
.ai-modal h3 { font-family: 'Lora', serif; color: var(--amber); font-size: 1.05rem; margin-bottom: 8px; }
.ai-modal p { font-size: 0.78rem; color: var(--text-soft); line-height: 1.5; margin-bottom: 12px; }
.ai-modal a { color: var(--teal); }
.ai-modal input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 9px 12px;
  font-family: 'Nunito', sans-serif; font-size: 0.85rem; margin-bottom: 12px;
}
.ai-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.ai-modal-actions button {
  border: none; border-radius: 999px; padding: 9px 18px; font-family: 'Nunito', sans-serif;
  font-size: 0.8rem; font-weight: 700; cursor: pointer;
}
.ai-modal-actions .cancel { background: transparent; color: var(--text-soft); }
.ai-modal-actions .save { background: var(--teal); color: #fff; }
</style>
</head>
<body>

<header>
  <span class="icon">💬</span>
  <h1>Perguntas em Família</h1>
  <p>Para conversas que ficam na memória</p>
</header>

<div class="mode-tabs" id="modeTabs">
  <button class="mode-tab active" data-mode="perguntas" onclick="setMode('perguntas')">💬 Perguntas</button>
  <button class="mode-tab" data-mode="quem" onclick="setMode('quem')">🤣 Quem é mais?</button>
  <button class="mode-tab" data-mode="prefere" onclick="setMode('prefere')">🤔 O que prefere?</button>
  <button class="mode-tab" data-mode="adivinha" onclick="setMode('adivinha')">🔍 Adivinhas</button>
</div>

<div class="categories" id="categories"></div>

<div class="card-wrapper">
  <div class="card" id="card"></div>
</div>

<p class="counter" id="counter"></p>

<div class="nav" id="nav">
  <button class="nav-btn prev" id="btnPrev" onclick="go(-1)">← Anterior</button>
  <button class="nav-btn next" id="btnNext" onclick="go(1)">Próxima →</button>
</div>

<div class="ai-panel">
  <div class="ai-panel-title">🤖 Perguntas com IA</div>
  <div class="ai-row">
    <button class="ai-btn" id="btnAiNew" onclick="generateAIQuestion()">✨ Gerar pergunta nova</button>
    <button class="ai-btn secondary" id="btnAiFollow" onclick="generateFollowUp()">💬 Pergunta de acompanhamento</button>
  </div>
  <textarea class="ai-answer-input" id="aiAnswerInput" placeholder="O que a criança respondeu? (opcional, usado na 'pergunta de acompanhamento')"></textarea>
  <div class="ai-status" id="aiStatus"></div>
  <div id="aiResultBox"></div>
</div>

<button class="ai-gear" id="aiGear" onclick="openKeyModal()" title="Configurar chave da IA">⚙️</button>

let currentMode = "perguntas";
let currentCat  = "all";
let deck = [], idx = 0, finished = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck(mode, cat) {
  const qs = DATA[mode].questions;
  return shuffle(cat === "all" ? qs : qs.filter(q => q.cat === cat));
}

function renderCats() {
  const container = document.getElementById("categories");
  container.innerHTML = "";
  DATA[currentMode].cats.forEach(c => {
    const btn = document.createElement("button");
    btn.className = `cat-btn ${c.cls}`;
    btn.dataset.cat = c.id;
    btn.textContent = c.label;
    if (c.id === currentCat) btn.classList.add("active");
    btn.onclick = () => selectCat(c.id);
    container.appendChild(btn);
  });
}

        <div class="answer-blur" id="answerBlur" onclick="revealAnswer()">${q.answer}</div>
        <span class="answer-hint" id="answerHint">👆 Toque para revelar a resposta</span>
       </div>` : "";

  card.innerHTML = `
    <span class="mode-badge ${currentMode}">${modeBadgeMap[currentMode]}</span>
    <span class="cat-label ${currentMode === 'adivinha' ? 'adivinha' : q.cat}">${currentMode === 'adivinha' ? 'Adivinha' : catName}</span>
    ${quemPrefix}${adivinhaPrefix}
    <p class="question">${q.text}</p>
    ${prefTip}${adivinhaAnswer}
  `;

  counter.textContent = `${idx + 1} de ${deck.length}`;

}

function clearAiPanel() {
  const box = document.getElementById("aiResultBox");
  const input = document.getElementById("aiAnswerInput");
  const status = document.getElementById("aiStatus");
  if (box) box.innerHTML = "";
  if (input) input.value = "";
  if (status) { status.textContent = ""; status.classList.remove("error"); }
}

function go(dir) {
  clearAiPanel();
  const card = document.getElementById("card");
  card.classList.add("fade-out");
  setTimeout(() => {
    card.classList.remove("fade-out");
    if (dir === 1) {
      if (idx < deck.length - 1) idx++;
      else finished = true;
    } else {
      if (finished) finished = false;
      else if (idx > 0) idx--;
    }
    render();
  }, 210);
}

function selectCat(cat) {
  clearAiPanel();
  currentCat = cat;
  deck = buildDeck(currentMode, cat);
  idx = 0; finished = false;
  document.querySelectorAll(".cat-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.cat === cat);
  });
  render();
}

function setMode(mode) {
  clearAiPanel();
  currentMode = mode;
  currentCat = "all";
  deck = buildDeck(mode, "all");
  idx = 0; finished = false;
  document.querySelectorAll(".mode-tab").forEach(t => {
    t.classList.toggle("active", t.dataset.mode === mode);
  });
  renderCats();
  render();
}

function restart() {
  deck = buildDeck(currentMode, currentCat);
  idx = 0; finished = false;
  document.getElementById("nav").style.display = "flex";
  render();
}

function revealAnswer() {
  const blur = document.getElementById("answerBlur");
  const hint = document.getElementById("answerHint");
  if (blur) blur.classList.add("revealed");
  if (hint) hint.classList.add("hidden");
}

const GEMINI_MODEL = "gemini-2.0-flash";
const KEY_STORAGE = "familia_gemini_api_key";

function getApiKey() { return localStorage.getItem(KEY_STORAGE) || ""; }

function openKeyModal() {
  const existing = getApiKey();
  const overlay = document.createElement("div");
  overlay.className = "ai-modal-overlay";
  overlay.id = "aiKeyOverlay";
  overlay.innerHTML = `
    <div class="ai-modal">
      <h3>🔑 Chave da IA (grátis)</h3>
      <p>Este joguinho usa a API gratuita do Google Gemini para gerar perguntas.
      Crie sua chave em <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a>
      (não pede cartão) e cole aqui. Ela fica salva só neste navegador.</p>
      <input type="text" id="aiKeyInput" placeholder="Cole sua chave aqui" value="${existing}">
      <div class="ai-modal-actions">
        <button class="cancel" onclick="closeKeyModal()">Cancelar</button>
        <button class="save" onclick="saveKey()">Salvar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}
function closeKeyModal() {
  const el = document.getElementById("aiKeyOverlay");
  if (el) el.remove();
}
function saveKey() {
  const val = document.getElementById("aiKeyInput").value.trim();
  if (val) localStorage.setItem(KEY_STORAGE, val);
  closeKeyModal();
  setAiStatus("Chave salva! Já pode gerar perguntas. ✅");
}

function setAiStatus(msg, isError) {
  const el = document.getElementById("aiStatus");
  el.textContent = msg || "";
  el.classList.toggle("error", !!isError);
}
function setAiLoading(loading, msg) {
  const btns = [document.getElementById("btnAiNew"), document.getElementById("btnAiFollow")];
  btns.forEach(b => b.disabled = loading);
  if (loading) setAiStatus(msg);
}

async function callGemini(prompt) {
  const key = getApiKey();
  if (!key) { openKeyModal(); throw new Error("Cole sua chave gratuita do Gemini para usar a IA."); }
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${encodeURIComponent(key)}`;
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.95, maxOutputTokens: 200 },
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "Erro ao falar com a IA.");
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error("A IA não retornou uma resposta. Tente de novo.");
  return text.trim().replace(/^["“]|["”]$/g, "");
}

    perguntas: "perguntas para conversar em família",
    quem: "perguntas do tipo 'quem é mais provável de...'",
    prefere: "perguntas do tipo 'você prefere...'",
    adivinha: "adivinhas (charadas com resposta)",
  };
  const catName = DATA[currentMode].catNames[currentCat] || "";
  return { modeDesc: modeNames[currentMode], catName };
}

async function generateAIQuestion() {
  setAiLoading(true, "Gerando pergunta nova...");
  document.getElementById("aiResultBox").innerHTML = "";
  try {
    const { modeDesc, catName } = currentContextLabel();
    const catPart = catName ? ` no estilo da categoria "${catName}"` : "";
    let prompt;
    if (currentMode === "adivinha") {
      prompt = `Crie UMA adivinha nova em português do Brasil, no estilo "o que é, o que é", apropriada para crianças e conversas em família. Responda SOMENTE neste formato exato, sem nada antes ou depois:
PERGUNTA: <a adivinha>
RESPOSTA: <a resposta curta>`;
    } else {
      prompt = `Crie UMA pergunta nova e original em português do Brasil para um joguinho de perguntas em família${catPart}. O joguinho é do tipo "${modeDesc}". A pergunta deve ser calorosa, apropriada para crianças, e estimular uma boa conversa entre pais e filhos. Responda apenas com a pergunta, sem aspas, sem numeração e sem nenhum texto adicional.`;
    }
    const result = await callGemini(prompt);
    let html;
    if (currentMode === "adivinha") {
      const match = result.match(/PERGUNTA:\s*([\s\S]*?)\s*RESPOSTA:\s*([\s\S]*)/i);
      const q = match ? match[1].trim() : result;
      const a = match ? match[2].trim() : "";
      html = `<div class="ai-question-box">${q}</div>
        <div class="answer-block"><div class="answer-blur" onclick="this.classList.add('revealed')">${a}</div>
        <span class="answer-hint">👆 Toque para revelar a resposta</span></div>`;
    } else {
      html = `<div class="ai-question-box">${result}</div>`;
    }
    document.getElementById("aiResultBox").innerHTML = html;
    setAiStatus("Pronto! ✨ (gerado por IA, fora do baralho normal)");
  } catch (err) {
    setAiStatus(err.message, true);
  } finally {
    setAiLoading(false);
  }
}

async function generateFollowUp() {
  const answer = document.getElementById("aiAnswerInput").value.trim();
  if (!answer) {
    setAiStatus("Escreva o que a criança respondeu, para eu criar uma boa pergunta de acompanhamento.", true);
    return;
  }
  setAiLoading(true, "Pensando em uma boa pergunta de acompanhamento...");
  document.getElementById("aiResultBox").innerHTML = "";
  try {
    const currentQ = (deck[idx] && deck[idx].text) || "";
    const prompt = `Estamos jogando um jogo de perguntas em família. A pergunta feita foi: "${currentQ}". A criança respondeu: "${answer}". Crie UMA pergunta de acompanhamento curta e calorosa em português do Brasil, que se aprofunde gentilmente nessa resposta e ajude a família a conversar mais. Responda apenas com a pergunta, sem aspas e sem texto adicional.`;
    const result = await callGemini(prompt);
    document.getElementById("aiResultBox").innerHTML = `<div class="ai-question-box">${result}</div>`;
    setAiStatus("Pronto! ✨");
  } catch (err) {
    setAiStatus(err.message, true);
  } finally {
    setAiLoading(false);
  }
}

// ─── INIT ───
setMode("perguntas");
</script>
